<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learn UI/UX in 30 Days</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --card: #141414;
  --border: #222;
  --border2: #2a2a2a;
  --orange: #FF5C00;
  --amber: #FFB800;
  --teal: #00C2A8;
  --white: #fff;
  --light: #ccc;
  --muted: #888;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--white);
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:16px 40px;
  display:flex;
  justify-content:space-between;
  background:rgba(10,10,10,0.9);
  border-bottom:1px solid var(--border);
}
.logo{font-weight:800;}
.logo span{color:var(--orange);}

/* MAIN LAYOUT (FIXED) */
.page-wrap{
  max-width:1200px;
  margin:0 auto;
  display:grid;
  grid-template-columns: 1fr 420px;
  gap:40px;
  padding:100px 20px 40px;
}

/* LEFT */
.left{
  padding:40px;
  border-right:1px solid var(--border);
}

.left h1{
  font-size:clamp(42px,5vw,64px);
  line-height:1.1;
  margin-bottom:20px;
}

.left h1 span:nth-child(1){color:var(--orange);}
.left h1 span:nth-child(2){color:var(--amber);}

.left p{
  color:var(--light);
  margin-bottom:30px;
}

/* LIST */
.what-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.what-item{
  display:flex;
  gap:10px;
  color:var(--light);
  font-size:14px;
}

.what-check{
  color:var(--teal);
}

/* RIGHT */
.right{
  display:flex;
  align-items:center;
}

.right-card{
  width:100%;
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:28px;
}

/* FORM */
.form-group{
  margin-bottom:14px;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border2);
  background:#0f0f0f;
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:50px;
  background:var(--orange);
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:900px){
  .page-wrap{
    grid-template-columns:1fr;
  }
  .left{
    border-right:none;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">uiux<span>diary</span></div>
  <div>$15</div>
</nav>

<div class="page-wrap">

  <!-- LEFT -->
  <div class="left">
    <h1>Learn <span>UI/UX</span><br/>in <span>30 Days</span></h1>
    <p>A structured roadmap with daily tasks, videos & tools.</p>

    <div class="what-list">
      <div class="what-item"><div class="what-check">✓</div>30-day plan</div>
      <div class="what-item"><div class="what-check">✓</div>Free resources</div>
      <div class="what-item"><div class="what-check">✓</div>Portfolio projects</div>
      <div class="what-item"><div class="what-check">✓</div>Lifetime access</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-card">

      <h3 style="margin-bottom:10px;">Get Access</h3>

      <form>
        <div class="form-group">
          <input type="text" placeholder="Full Name"/>
        </div>

        <div class="form-group">
          <input type="email" placeholder="Email"/>
        </div>

        <div class="form-group">
          <select>
            <option>Select Country</option>
            <option>Nepal</option>
            <option>India</option>
          </select>
        </div>

        <button>Buy Now →</button>
      </form>

    </div>
  </div>

</div>

</body>
</html>
